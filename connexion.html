<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Connexion / Inscription — Igikubo Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body style="display:flex; flex-direction:column; min-height:100vh;">
<header id="site-header" data-active=""></header>

<section class="auth-wrap">
  <div class="auth-card">
    <!-- PANNEAU MARQUE -->
    <div class="auth-brand">
      <div class="auth-brand__deco"></div>
      <div class="auth-brand__top">
        <span class="auth-brand__logo">
          <span class="auth-brand__octa"><span></span></span>
          Igikubo
        </span>
        <h2 id="panel-title">Content de te revoir !</h2>
        <p id="panel-text">Retrouve tes disques, ton panier et tes créateurs préférés.</p>
      </div>
      <div class="auth-brand__disc">
        <div class="auth-disc"><span>i</span></div>
      </div>
    </div>

    <!-- PANNEAU FORMULAIRE -->
    <div class="auth-form" id="inscription">
      <div class="auth-tabs">
        <button type="button" id="tab-login" class="on" onclick="setMode('login')">Connexion</button>
        <button type="button" id="tab-signup" onclick="setMode('signup')">Inscription</button>
      </div>

      <div class="auth-profile" style="display:flex; flex-direction:column; gap:10px;">
        <span class="lbl">Je m'inscris en tant que</span>
        <div class="profile-cards">
          <button type="button" class="profile-card joueur on" id="card-joueur" onclick="setProfile('joueur')">
            <span class="profile-card__icon" style="background:#ff9e7d;">♟</span>
            <div><strong>Joueur</strong><span>J'achète des disques</span></div>
          </button>
          <button type="button" class="profile-card createur" id="card-createur" onclick="setProfile('createur')">
            <span class="profile-card__icon" style="background:#7ec99a;">✦</span>
            <div><strong>Créateur</strong><span>Je vends mes disques</span></div>
          </button>
        </div>
      </div>

      <div class="fields">
        <label class="field" id="field-name" hidden>
          <span>Nom complet</span>
          <input type="text" placeholder="Ex. Imena Rugamba">
        </label>
        <label class="field">
          <span>Adresse e-mail</span>
          <input type="email" placeholder="bonjour@exemple.com">
        </label>
        <label class="field">
          <span>Mot de passe</span>
          <input type="password" placeholder="••••••••">
        </label>
      </div>

      <a href="#" class="auth-forgot" id="forgot">Mot de passe oublié ?</a>

      <button type="button" class="auth-submit" id="submit">Se connecter</button>

      <div class="auth-sep"><span></span>ou<span></span></div>
      <div class="auth-social">
        <button type="button">Google</button>
        <button type="button">Apple</button>
      </div>

      <p class="auth-switch" id="switch"></p>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/components.js"></script>
<script>
  let mode = 'login', profile = 'joueur';

  function setMode(m) { mode = m; render(); }
  function setProfile(p) { profile = p; render(); }
  function toggleMode() { mode = mode === 'login' ? 'signup' : 'login'; render(); }

  function render() {
    const isLogin = mode === 'login';
    const accent = profile === 'joueur' ? '#ff8a63' : '#5fae82';

    document.getElementById('panel-title').textContent = isLogin ? 'Content de te revoir !' : 'Rejoins la communauté';
    document.getElementById('panel-text').textContent = isLogin
      ? 'Retrouve tes disques, ton panier et tes créateurs préférés.'
      : "Un seul plateau, des centaines de jeux. Crée ton compte joueur ou créateur en quelques secondes.";

    document.getElementById('tab-login').className = isLogin ? 'on' : '';
    document.getElementById('tab-signup').className = isLogin ? '' : 'on';

    document.getElementById('card-joueur').className = 'profile-card joueur' + (profile === 'joueur' ? ' on' : '');
    document.getElementById('card-createur').className = 'profile-card createur' + (profile === 'createur' ? ' on' : '');

    document.getElementById('field-name').hidden = isLogin;
    document.getElementById('forgot').hidden = !isLogin;

    const submit = document.getElementById('submit');
    submit.textContent = isLogin ? 'Se connecter' : (profile === 'joueur' ? 'Créer mon compte joueur' : 'Créer mon compte créateur');
    submit.style.background = accent;
    submit.style.boxShadow = `0 12px 24px ${accent}55`;

    document.getElementById('switch').innerHTML = (isLogin ? "Pas encore de compte ? " : 'Déjà inscrit ? ') +
      `<button type="button" onclick="toggleMode()">${isLogin ? "S'inscrire" : 'Se connecter'}</button>`;
  }

  document.addEventListener('DOMContentLoaded', () => {
    // Ouvre directement l'inscription si l'ancre #inscription est présente.
    if (location.hash === '#inscription') mode = 'signup';
    render();
  });
</script>
</body>
</html>
