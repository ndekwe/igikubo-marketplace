# Déploiement Igikubo Marketplace (Next.js 16 + Supabase) sur Netlify.
# Le runtime Next.js de Netlify (@netlify/plugin-nextjs) gère le build serveur,
# les fonctions serverless et le proxy. Les variables d'environnement
# (Supabase, Stripe, NEXT_PUBLIC_SITE_URL) se règlent dans l'UI Netlify, jamais ici.

[build]
  command = "next build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
