# Déploiement Igikubo Marketplace (Next.js 16 + Supabase) sur Netlify.
# Le runtime Next.js de Netlify (@netlify/plugin-nextjs) gère le build serveur,
# les fonctions serverless et le proxy. Les variables d'environnement
# (Supabase, Stripe, NEXT_PUBLIC_SITE_URL) se règlent dans l'UI Netlify, jamais ici.

[build]
  command = "next build"

[build.environment]
  NODE_VERSION = "20"
  # La clé anon et l'URL Supabase sont publiques (protégées par la RLS) et se
  # retrouvent normalement dans le bundle client : on les exclut du scanner de secrets.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"
