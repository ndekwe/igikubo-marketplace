<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalogue des disques — Igikubo Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<header id="site-header" data-active="catalogue"></header>

<section class="container cat-intro" style="padding-top:34px; padding-bottom:10px;">
  <div class="crumbs" style="margin-bottom:10px;"><a href="index.html">Accueil</a> &nbsp;›&nbsp; <span class="here">Catalogue</span></div>
  <h1>Le catalogue des disques</h1>
  <p>Glisse, joue, recommence. Filtre par thème, âge ou budget pour trouver le disque parfait pour ton plateau.</p>
</section>

<section class="container cat-layout" style="padding-top:24px; padding-bottom:60px;">
  <aside class="filters">
    <div class="filters__head">
      <span>Filtres</span>
      <button type="button" class="filters__reset" onclick="resetFilters()">Réinitialiser</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">Thème</span>
      <div id="theme-filters"></div>
    </div>

    <div class="filter-sep"></div>

    <div class="filter-group">
      <span class="filter-label">Tranche d'âge</span>
      <div class="chips" id="age-chips"></div>
    </div>

    <div class="filter-group">
      <span class="filter-label">Nombre de joueurs</span>
      <div class="chips" id="player-chips"></div>
    </div>

    <div class="filter-sep"></div>

    <div class="filter-group">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <span class="filter-label">Prix max</span>
        <span class="price-value" id="price-label">20,00 €</span>
      </div>
      <input type="range" min="5" max="20" step="0.5" value="20" id="price-range" oninput="setPrice(this.value)">
    </div>

    <div class="filter-group">
      <span class="filter-label">Note minimale</span>
      <div class="chips" id="rating-chips"></div>
    </div>
  </aside>

  <div class="cat-results">
    <div class="toolbar">
      <span class="toolbar__count"><b id="count">0</b> disques trouvés</span>
      <label>Trier par
        <select id="sort" onchange="setSort(this.value)">
          <option value="pop">Popularité</option>
          <option value="new">Nouveautés</option>
          <option value="asc">Prix croissant</option>
          <option value="desc">Prix décroissant</option>
          <option value="rating">Mieux notés</option>
        </select>
      </label>
    </div>

    <div id="results"></div>

    <div class="pagination">
      <span class="active">1</span>
      <span>2</span>
      <span>3</span>
      <span>→</span>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="assets/components.js"></script>
<script>
  const DATA = [
    { title:'Les Fractales de Kigali', theme:'Mathématiques', creator:'Atelier Imena', price:12.9, rating:4.8, reviews:124, color:'#5aa9f0', colorLight:'#cfe6fb', icon:'π' },
    { title:'Royaumes des Grands Lacs', theme:'Histoire', creator:'Studio Karibu', price:14.5, rating:4.9, reviews:89, color:'#f0a860', colorLight:'#fbe6cd', icon:'H' },
    { title:'Le Grand Jeu des Langues', theme:'Langues', creator:'Lingua Lab', price:9.9, rating:4.7, reviews:203, color:'#ff9e7d', colorLight:'#ffded2', icon:'L' },
    { title:'Forêt Vivante', theme:'Biologie', creator:'Mata Studio', price:11.5, rating:4.9, reviews:156, color:'#7ec99a', colorLight:'#d6efe0', icon:'B' },
    { title:'Code & Cosmos', theme:'Informatique', creator:'Pixel Nkusi', price:13.0, rating:4.6, reviews:78, color:'#4fc6c0', colorLight:'#cdeeec', icon:'I' },
    { title:'Masques & Rituels', theme:'Anthropologie', creator:'Collectif Ubuntu', price:15.5, rating:4.8, reviews:64, color:'#b8a7f0', colorLight:'#e8e2fb', icon:'A' },
    { title:'La Route du Sel', theme:'Stratégie', creator:'Studio Karibu', price:16.9, rating:4.7, reviews:142, color:'#e0a93a', colorLight:'#fff0c9', icon:'S' },
    { title:'Tombola des Étoiles', theme:'Hasard', creator:'Jeux Soleil', price:8.5, rating:4.5, reviews:97, color:'#e07ec0', colorLight:'#fcdcf0', icon:'?' },
    { title:'Légendes & Héros', theme:'Jeux de rôle', creator:'Atelier Imena', price:17.5, rating:4.9, reviews:110, color:'#a98ee0', colorLight:'#e4d9f7', icon:'R' },
    { title:'Multiplions !', theme:'Mathématiques', creator:'Petite École', price:7.9, rating:4.6, reviews:188, color:'#5aa9f0', colorLight:'#cfe6fb', icon:'×' },
    { title:'Cartographes', theme:'Histoire', creator:'Mata Studio', price:12.0, rating:4.7, reviews:73, color:'#f0a860', colorLight:'#fbe6cd', icon:'C' },
    { title:'Mots Mêlés du Monde', theme:'Langues', creator:'Lingua Lab', price:10.5, rating:4.8, reviews:134, color:'#ff9e7d', colorLight:'#ffded2', icon:'M' }
  ];

  const THEME_META = [
    ['Mathématiques','#5aa9f0'],['Histoire','#f0a860'],['Langues','#ff9e7d'],
    ['Biologie','#7ec99a'],['Informatique','#4fc6c0'],['Anthropologie','#b8a7f0'],
    ['Stratégie','#e0a93a'],['Hasard','#e07ec0'],['Jeux de rôle','#a98ee0']
  ];
  const AGES = ['4-6 ans','7-9 ans','10-12 ans','13+ ans'];
  const PLAYERS = ['Solo','2 joueurs','3-4','5+'];
  const RATINGS = [['Toutes',0],['4,5 ★ +',4.5],['4,8 ★ +',4.8]];

  let state = { themes: [], maxPrice: 20, minRating: 0, sort: 'pop', age: '', players: '' };

  function toggleTheme(name) {
    state.themes = state.themes.includes(name) ? state.themes.filter(t => t !== name) : [...state.themes, name];
    render();
  }
  function setPrice(v) { state.maxPrice = parseFloat(v); render(); }
  function setSort(v) { state.sort = v; render(); }
  function setAge(a) { state.age = state.age === a ? '' : a; render(); }
  function setPlayers(p) { state.players = state.players === p ? '' : p; render(); }
  function setRating(v) { state.minRating = v; render(); }
  function resetFilters() {
    state = { themes: [], maxPrice: 20, minRating: 0, sort: 'pop', age: '', players: '' };
    document.getElementById('price-range').value = 20;
    document.getElementById('sort').value = 'pop';
    render();
  }

  function render() {
    const s = state;
    let list = DATA.filter(d => (s.themes.length === 0 || s.themes.includes(d.theme)) && d.price <= s.maxPrice && d.rating >= s.minRating);
    if (s.sort === 'asc') list.sort((a, b) => a.price - b.price);
    else if (s.sort === 'desc') list.sort((a, b) => b.price - a.price);
    else if (s.sort === 'rating') list.sort((a, b) => b.rating - a.rating);
    else if (s.sort === 'new') list.reverse();
    else list.sort((a, b) => b.reviews - a.reviews);

    document.getElementById('count').textContent = list.length;
    document.getElementById('price-label').textContent = s.maxPrice.toFixed(2).replace('.', ',') + ' €';

    // Thèmes
    document.getElementById('theme-filters').innerHTML = '<div class="filter-group">' + THEME_META.map(([name, color]) => {
      const active = s.themes.includes(name);
      return `<button type="button" class="theme-row ${active ? 'active' : ''}" onclick="toggleTheme('${name.replace(/'/g, "\\'")}')">
        <span class="theme-row__name"><span class="theme-dot" style="background:${color};"></span>${name}</span>
        <span class="theme-check">${active ? '✓' : ''}</span>
      </button>`;
    }).join('') + '</div>';

    document.getElementById('age-chips').innerHTML = AGES.map(a => `<button type="button" class="chip ${s.age === a ? 'active' : ''}" onclick="setAge('${a}')">${a}</button>`).join('');
    document.getElementById('player-chips').innerHTML = PLAYERS.map(p => `<button type="button" class="chip ${s.players === p ? 'active' : ''}" onclick="setPlayers('${p}')">${p}</button>`).join('');
    document.getElementById('rating-chips').innerHTML = RATINGS.map(([label, val]) => `<button type="button" class="chip ${s.minRating === val ? 'active' : ''}" onclick="setRating(${val})">${label}</button>`).join('');

    const results = document.getElementById('results');
    if (list.length) {
      results.innerHTML = '<div class="grid-cards grid-cards--tight">' + list.map(discCard).join('') + '</div>';
    } else {
      results.innerHTML = `<div class="empty">
        <span class="empty__icon">∅</span>
        <h3>Aucun disque ne correspond</h3>
        <p>Essaie d'élargir tes filtres ou de réinitialiser ta recherche.</p>
        <button type="button" class="btn btn-primary btn-md" onclick="resetFilters()">Réinitialiser les filtres</button>
      </div>`;
    }
  }

  document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
